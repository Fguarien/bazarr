services:
  bazarr:
    image: ghcr.io/linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/bazarr:/config
      - "/volume1/Media/Movies:/movies:rw"
      - "/volume1/Media/TV Shows:/tv:rw"
    ports:
      - "6767:6767"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/radarr:/config
      - /volume1/downloads:/downloads
      - "/volume1/Media/Movies:/movies:rw"
    ports:
      - "7878:7878"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/sonarr:/config
      - /volume1/downloads:/downloads
      - "/volume1/Media/TV Shows:/tv:rw"
    ports:
      - "8989:8989"
    restart: unless-stopped

  jackett:
    image: ghcr.io/linuxserver/jackett
    container_name: jackett
    environment:
      - AUTO_UPDATE=true
      - PUID=1026
      - PGID=100
      - TZ=Europe/Bucharest
    volumes:
      - /volume1/docker/jackett/config:/config
      - /volume1/docker/jackett/downloads:/downloads
    ports:
      - 9117:9117
    restart: always
  
  lidarr:
    image: ghcr.io/linuxserver/lidarr:latest
    container_name: lidarr
    environment:
      - PUID=1026         
      - PGID=100          
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/lidarr/config:/config
      - /volume1/music/organized:/music
      - /volume1/music/deleted:/trashed
      - /volume1/downloads:/downloads
    ports:
      - "8686:8686"       
    restart: unless-stopped

  readarr:
    image: linuxserver/readarr:0.1.0-nightly-alpine
    container_name: readarr
    environment:
      - PUID=1026         # À adapter à ton utilisateur DSM
      - PGID=100          # À adapter à ton groupe DSM
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/readarr/config:/config
      - /volume1/Readable:/books        # Bibliothèque
      - /volume1/downloads:/downloads      # Dossier de téléchargement
    ports:
      - 8787:8787                         
    restart: unless-stopped