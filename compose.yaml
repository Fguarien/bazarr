services:
  bazarr:
    image: ghcr.io/linuxserver/bazarr
    container_name: bazarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/bazarr:/config
      - "/volume1/Media/Movies:/movies:rw"
      - "/volume1/Media/TV Shows:/tv:rw"
    ports:
      - "6767:6767"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/radarr:/config
      - /volume1/downloads:/downloads
      - "/volume1/Media/Movies:/movies:rw"
    ports:
      - "7878:7878"
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    environment:
      - PUID=1026
      - PGID=100
      - TZ=Europe/Brussels
    volumes:
      - /volume1/docker/sonarr:/config
      - /volume1/downloads:/downloads
      - "/volume1/Media/TV Shows:/tv:rw"
    ports:
      - "8989:8989"
    restart: unless-stopped

  jackett:
    image: ghcr.io/linuxserver/jackett
    container_name: jackett
    environment:
      - AUTO_UPDATE=true
      - PUID=1026
      - PGID=100
      - TZ=Europe/Bucharest
    volumes:
      - /volume1/docker/jackett/config:/config
      - /volume1/docker/jackett/downloads:/downloads
    ports:
      - 9117:9117
    restart: always
    
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Brussels
    ports:
      - 8191:8191
    restart: always